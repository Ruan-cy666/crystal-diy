    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
      background: #FAF8FC;
      background-image: radial-gradient(ellipse at 20% 30%, rgba(184,169,201,0.06) 0%, transparent 50%),

      color: #4A4040;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    header {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(184,169,201,0.08);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 30px rgba(74,64,64,0.03);
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      font-size: 1.7rem;
      font-weight: 700;
      color: #6A5A6E;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo i {
      font-size: 1.8rem;
      color: #B8A9C9;
      background: rgba(184,169,201,0.12);
      padding: 10px;
      border-radius: 50%;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: #5A4E4E;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 0.95rem;
      position: relative;
      transition: all 0.35s;
      background: transparent;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #B8A9C9, #D4C5A9);
      border-radius: 10px;
      transition: all 0.4s;
      transform: translateX(-50%);
    }
    .nav-links a:hover::after,
    .nav-links a.active::after { width: 65%; }
    .nav-links a:hover { color: #3A2A3E; transform: translateY(-2px); }
    .nav-links a.active { color: #4A3A4A; background: rgba(184,169,201,0.06); }

    main { flex: 1; padding: 50px 0 30px; }
    .page-title {
      font-size: 2.4rem;
      font-weight: 700;
      color: #5A4A5A;
      text-align: center;
      margin-bottom: 8px;
    }
    .page-title i { color: #B8A9C9; margin-right: 8px; }
    .page-subtitle {
      text-align: center;
      color: #8A7A7A;
      font-size: 1.05rem;
      margin-bottom: 40px;
    }

    footer {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(184,169,201,0.06);
      text-align: center;
      padding: 28px 0;
      color: #7A6E6E;
      font-size: 0.95rem;
      margin-top: 40px;
    }
    footer i { color: #C9A9A9; margin: 0 4px; }

    /* ===== 搜索区域 ===== */
    .search-section {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 32px 36px;
      border: 1px solid rgba(184,169,201,0.06);
      box-shadow: 0 4px 20px rgba(74,64,64,0.03);
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(245,240,248,0.3);
      border-radius: 60px;
      padding: 6px 6px 6px 24px;
      border: 2px solid rgba(184,169,201,0.08);
      transition: 0.3s;
    }
    .search-box:focus-within {
      border-color: #B8A9C9;
      box-shadow: 0 0 30px rgba(184,169,201,0.06);
    }
    .search-box i {
      color: #B8A9C9;
      font-size: 1.1rem;
    }
    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 0;
      font-size: 1rem;
      font-family: 'Quicksand', sans-serif;
      color: #4A4040;
      outline: none;
    }
    .search-box input::placeholder {
      color: #B8A9C9;
      opacity: 0.6;
    }
    .search-box .btn-search {
      background: linear-gradient(135deg, #B8A9C9, #C9B5D8);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Quicksand', sans-serif;
    }
    .search-box .btn-search:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(184,169,201,0.3);
    }

    /* ===== 关键词标签 ===== */
    .keyword-section {
      margin-top: 20px;
    }
    .keyword-section .label {
      font-size: 0.8rem;
      color: #8A7A7A;
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }
    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .keyword-tag {
      padding: 6px 18px;
      border-radius: 30px;
      border: 1.5px solid rgba(184,169,201,0.12);
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.8rem;
      font-weight: 500;
      color: #5A4E4E;
      font-family: 'Quicksand', sans-serif;
    }
    .keyword-tag:hover {
      border-color: #B8A9C9;
      background: rgba(184,169,201,0.06);
      transform: translateY(-2px);
    }
    .keyword-tag.active {
      border-color: #B8A9C9;
      background: rgba(184,169,201,0.12);
      color: #4A3A4A;
    }

    /* ===== 结果展示 ===== */
    .result-section {
      margin-top: 10px;
    }
    .result-count {
      font-size: 0.85rem;
      color: #8A7A7A;
      margin-bottom: 16px;
    }
    .result-count strong { color: #B8A9C9; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .result-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(184,169,201,0.06);
      box-shadow: 0 4px 20px rgba(74,64,64,0.03);
      transition: all 0.4s;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(74,64,64,0.06);
      border-color: rgba(184,169,201,0.12);
    }

    .result-card .symbol {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .result-card .symbol .glow {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      opacity: 0.15;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.08); opacity: 0.25; }
    }

    .result-card .info { flex: 1; }
    .result-card .info .name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #5A4A5A;
    }
    .result-card .info .meaning {
      font-size: 0.85rem;
      color: #7A6E6E;
      margin: 4px 0;
    }
    .result-card .info .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .result-card .info .tags span {
      font-size: 0.6rem;
      padding: 2px 12px;
      border-radius: 20px;
      background: rgba(184,169,201,0.06);
      color: #6A5A6E;
      border: 1px solid rgba(184,169,201,0.04);
    }
    .result-card .info .chakra {
      font-size: 0.7rem;
      color: #B8A9C9;
      font-weight: 600;
      margin-top: 4px;
    }

      text-align: center;
      padding: 40px 20px;
      color: #9A8A8A;
      grid-column: 1 / -1;
    }
    .no-result i {
      font-size: 2.5rem;
      color: #D4C5A9;
      display: block;
      margin-bottom: 12px;
    }

      font-size: 1.3rem;
      color: #5A4A5A;
      margin: 30px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;

    .all-crystals-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(184,169,201,0.15), transparent);
    }

    @media (max-width: 768px) {
      nav { flex-direction: column; gap: 10px; }
      .nav-links { justify-content: center; gap: 4px; }
      .nav-links a { padding: 8px 14px; font-size: 0.82rem; }
      .page-title { font-size: 1.8rem; }
      .search-section { padding: 20px; }
      .search-box { flex-wrap: wrap; padding: 12px; border-radius: 24px; }
      .search-box input { width: 100%; padding: 10px 0; }
      .search-box .btn-search { width: 100%; justify-content: center; }
      .result-grid { grid-template-columns: 1fr; }
      .result-card { padding: 18px; }
    }
  </style>
</head>

  { label: '💚 绿色', value: '绿色' },
  { label: '💛 黄色', value: '黄色' },
  { label: '🖤 黑色', value: '黑色' }
];

// ============================================================
//  搜索逻辑
// ============================================================
function searchCrystals() {
  var input = document.getElementById('searchInput').value.trim().toLowerCase();
  var results = document.getElementById('resultGrid');
  var count = document.getElementById('resultCount');
  var allGrid = document.getElementById('allCrystalsGrid');

  if (!input) {
    results.innerHTML = '';
    count.innerHTML = '';
    showAllCrystals();
    return;
  }

  var matched = [];
  for (var i = 0; i < CRYSTAL_DB.length; i++) {
    var c = CRYSTAL_DB[i];
    var nameMatch = c.name.toLowerCase().indexOf(input) !== -1;
    var meaningMatch = c.meaning.toLowerCase().indexOf(input) !== -1;
    var effectsMatch = false;
    for (var j = 0; j < c.effects.length; j++) {
      if (c.effects[j].toLowerCase().indexOf(input) !== -1) { effectsMatch = true; break; }
    }
    var groupMatch = c.group.toLowerCase().indexOf(input) !== -1;
    var chakraMatch = c.chakra.toLowerCase().indexOf(input) !== -1;
    if (nameMatch || meaningMatch || effectsMatch || groupMatch || chakraMatch) {
      matched.push(c);
    }
  }

  if (matched.length === 0) {
    results.innerHTML = '<div class="no-result"><i class="fas fa-search"></i><p>没有找到与「' + input + '」相关的水晶</p><p style="font-size:0.85rem;margin-top:4px;">试试其他关键词：爱情、财富、静心、保护...</p></div>';
    count.innerHTML = '<span style="color:#9A8A8A;">0 个结果</span>';
    allGrid.innerHTML = '';
    return;
  }

  count.innerHTML = '找到 <strong>' + matched.length + '</strong> 个相关水晶';
  var html = '';
  for (var k = 0; k < matched.length; k++) {
    html += createCard(matched[k]);
  }
  results.innerHTML = html;
  allGrid.innerHTML = '';
}

function createCard(c) {
  var effectsHtml = '';
  var effectsToShow = c.effects.slice(0, 4);
  for (var i = 0; i < effectsToShow.length; i++) {
    effectsHtml += '<span>' + effectsToShow[i] + '</span>';
  }
  return '<div class="result-card">' +
    '<div class="symbol" style="background:' + c.color + '22; color:' + c.color + ';">' +
      '<div class="glow" style="background:' + c.color + ';"></div>' +
      '<span style="font-size:2.2rem;">' + c.emoji + '</span>' +
    '</div>' +
    '<div class="info">' +
      '<div class="name">' + c.name + '</div>' +
      '<div class="meaning">' + c.meaning + '</div>' +
      '<div class="tags">' + effectsHtml + '</div>' +
      '<div class="chakra">✦ ' + c.chakra + ' · ' + c.group + '</div>' +
    '</div>' +
  '</div>';
}

function showAllCrystals() {
  var grid = document.getElementById('allCrystalsGrid');
  var html = '';
  for (var i = 0; i < CRYSTAL_DB.length; i++) {
    html += createCard(CRYSTAL_DB[i]);
  }
  grid.innerHTML = html;
}

// ============================================================
//  关键词点击
// ============================================================
function setupKeywords() {
  var container = document.getElementById('keywordTags');
  for (var i = 0; i < KEYWORDS.length; i++) {
    var kw = KEYWORDS[i];
    var tag = document.createElement('span');
    tag.className = 'keyword-tag';
    tag.textContent = kw.label;
    tag.dataset.value = kw.value;
    (function(val) {
      tag.addEventListener('click', function() {
        document.getElementById('searchInput').value = val;
        var allTags = document.querySelectorAll('.keyword-tag');
        for (var t = 0; t < allTags.length; t++) {
          allTags[t].classList.remove('active');
        }
        this.classList.add('active');
        searchCrystals();
      });
    })(kw.value);
    container.appendChild(tag);
  }
}

// ============================================================
//  初始化
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  setupKeywords();
  showAllCrystals();
});

window.searchCrystals = searchCrystals;
</script>
</body>
</html>
